<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AirBrush — 文档可视化</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f8fafc;--card:#ffffff;--text:#0b1220;--muted:#6b7280;--accent:#0f4fff}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    .app{display:flex;gap:20px;padding:20px;min-height:100vh}
    .left{width:320px;background:linear-gradient(180deg,rgba(255,255,255,0.85),rgba(255,255,255,0.95));border-radius:12px;padding:18px;border:1px solid rgba(11,18,32,0.04);height:calc(100vh - 40px);overflow:auto}
    .main{flex:1;padding:22px;background:transparent;height:calc(100vh - 40px);overflow:auto}
    h1{margin:6px 0 8px 0;font-size:20px}
    .search{display:flex;gap:8px;margin-bottom:12px}
    .search input{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(11,18,32,0.06);background:white}
    .btn{padding:8px 10px;border-radius:10px;border:1px solid rgba(11,18,32,0.06);background:white;cursor:pointer}
    .toc a{display:block;padding:8px;border-radius:8px;color:var(--text);text-decoration:none;font-size:14px}
    .toc a:hover{background:rgba(15,79,255,0.06);color:var(--accent)}
    .section-card{background:var(--card);padding:18px;border-radius:12px;margin-bottom:16px;border:1px solid rgba(11,18,32,0.04)}
    .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
    details{margin-bottom:10px}
    summary{font-weight:600;cursor:pointer;outline:none}
    .metrics{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .metric{background:linear-gradient(180deg,rgba(15,79,255,0.06),rgba(15,79,255,0.03));padding:10px;border-radius:10px;min-width:120px}
    table{width:100%;border-collapse:collapse;margin:8px 0}
    th,td{padding:8px;border-bottom:1px solid rgba(11,18,32,0.04);text-align:left}
    @media (max-width:920px){.app{flex-direction:column}.left{width:100%;height:auto}.main{height:auto}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="left">
      <h1>AirBrush 文档</h1>
      <div class="meta">来源：仓库 README.md · 浅色背景 · 深色文字 · 分层折叠</div>
      <div class="search">
        <input id="search" placeholder="搜索关键词、章节名...">
        <button id="toggle" class="btn">全部折叠</button>
      </div>
      <nav class="toc" id="toc"></nav>
      <div style="margin-top:18px;color:var(--muted);font-size:13px">提示：点击目录跳转并展开对应内容；使用搜索过滤章节。</div>
    </aside>

    <main class="main">
      <div class="section-card">
        <h2 id="title">AirBrush — 产品文档可视化</h2>
        <div class="meta" id="subtitle">加载中…</div>
        <div class="metrics" id="metrics"></div>
      </div>

      <div id="content"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <script>
    const md = window.markdownit({html:true,linkify:true});
    async function loadAndRender(){
      // 获取仓库根目录的 README.md
      let resp;
      try{ resp = await fetch('/README.md'); }
      catch(e){ console.error(e); }
      const text = resp ? await resp.text() : '无法加载 README.md';
      document.getElementById('subtitle').textContent = '根据 README.md 动态渲染';

      const html = md.render(text);
      const container = document.getElementById('content');
      container.innerHTML = html;

      // 将 h2/h3 封装为 details 以便分层阅读
      const headings = container.querySelectorAll('h1,h2,h3');
      const sections = [];
      headings.forEach((h,i)=>{
        const level = Number(h.tagName.substring(1));
        const id = h.textContent.trim().toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g,'-') + '-' + i;
        h.id = id;
        const sec = document.createElement('div');
        sec.className = 'section-card';
        const details = document.createElement('details');
        details.open = level<=2; // h1/h2 默认展开
        const summary = document.createElement('summary');
        summary.innerHTML = h.innerHTML;
        // collect nodes until next heading of same or higher level
        let node = h.nextElementSibling;
        const wrapper = document.createElement('div');
        while(node && !(/^H[1-3]$/.test(node.tagName))){ wrapper.appendChild(node.cloneNode(true)); node = node.nextElementSibling }
        details.appendChild(summary);
        details.appendChild(wrapper);
        sec.appendChild(details);
        sections.push({id,level,el:sec,heading:h});
        // remove original heading and siblings (we cloned)
        // we'll remove later in batch
      });
      // 清空原始内容，按 sections 顺序插入
      container.innerHTML = '';
      sections.forEach(s=>container.appendChild(s.el));

      // 生成目录
      const toc = document.getElementById('toc'); toc.innerHTML = '';
      sections.forEach(s=>{
        const a = document.createElement('a');
        a.href = '#'+s.id;
        a.textContent = (s.level===1? '• ' : s.level===2? '◦ ' : '▪︎ ') + s.heading.textContent;
        a.addEventListener('click',(e)=>{ e.preventDefault(); const det = s.el.querySelector('details'); det.open = true; s.el.scrollIntoView({behavior:'smooth'});});
        toc.appendChild(a);
      });

      // 提取关键指标（尝试从文本中找匹配）
      const metricsEl = document.getElementById('metrics');
      metricsEl.innerHTML = '';
      const match = text.match(/累计全球下载量：?\s*([\d,\.\+\s\w%]+)/);
      const payrate = text.match(/付费转化率：?\s*([^\n]+)/);
      const regions = text.match(/用户地域分布：?\s*([^\n]+)/);
      const maurank = text.match(/市场排名：?([^\n]+)/);
      if(match) metricsEl.appendChild(createMetric('下载量', match[1]));
      if(payrate) metricsEl.appendChild(createMetric('付费转化率', payrate[1]));
      if(regions) metricsEl.appendChild(createMetric('地域分布', regions[1]));
      if(maurank) metricsEl.appendChild(createMetric('市场排名', maurank[1]));

      // 搜索功能
      document.getElementById('search').addEventListener('input',(e)=>{
        const q = e.target.value.trim().toLowerCase();
        document.querySelectorAll('.section-card').forEach(card=>{
          card.style.display = card.textContent.toLowerCase().includes(q) ? '' : (q? 'none' : '');
        });
        // filter toc
        Array.from(toc.querySelectorAll('a')).forEach(a=>{ a.style.display = a.textContent.toLowerCase().includes(q) ? '' : 'none' });
      });

      // toggle button
      const toggle = document.getElementById('toggle'); let collapsed=false;
      toggle.addEventListener('click',()=>{ collapsed=!collapsed; document.querySelectorAll('details').forEach(d=>d.open = !collapsed); toggle.textContent = collapsed? '全部展开':'全部折叠'; });
    }

    function createMetric(title,val){ const el = document.createElement('div'); el.className='metric'; el.innerHTML = `<div style="font-size:12px;color:var(--muted)">${title}</div><div style="font-weight:700;margin-top:6px">${val}</div>`; return el }

    loadAndRender();
  </script>
</body>
</html>
